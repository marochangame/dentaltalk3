<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="デンタルトーク">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>デンタルトーク</title>
<style>
:root{--main:#0f8fa8;--main2:#0f6f82;--bg:#f7fbfc;--line:#d9edf2;--text:#13212b;--muted:#7a8a93;--danger:#d75a5a}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif}button,input,select{font:inherit}.app{height:100dvh;display:flex;flex-direction:column;padding:12px 18px max(12px,env(safe-area-inset-bottom));gap:8px}.title{display:flex;align-items:center;gap:10px;min-height:46px}.logo{width:50px;height:50px;flex:0 0 auto}.brand-name{font-weight:900;color:var(--main2);font-size:28px;line-height:1}.sub{font-weight:800;color:#6d7d85;font-size:13px;margin-top:4px}.screen{flex:0 0 27%;min-height:165px;background:#fff;border:2px solid var(--line);border-radius:24px;padding:26px 24px;display:flex;align-items:flex-start;justify-content:flex-start;overflow:auto;white-space:pre-wrap;font-size:29px;line-height:1.35;font-weight:900;color:#12202a}.placeholder{color:#91a3aa}.actions{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}.btn{border:1.5px solid #d9e5e9;background:#fff;border-radius:16px;padding:10px 8px;font-weight:900;color:var(--main2);min-height:46px}.btn.primary{background:var(--main);color:#fff;border-color:var(--main)}.btn.danger{color:var(--danger);border:2px solid #e9b8b8;background:#fff}.btn:active{transform:scale(.985);opacity:.85}.bottom{flex:1;min-height:0;background:#fff;border:1.5px solid #dbe9ed;border-radius:22px;padding:10px 12px 8px;display:flex;flex-direction:column;overflow:hidden}.tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;overflow:visible;padding-bottom:8px;flex:0 0 auto}.tab{min-width:0;white-space:nowrap;border:1.5px solid #d9e5e9;background:#fff;border-radius:999px;padding:8px 6px;font-size:16px;font-weight:900;color:var(--main2)}.tab.active{background:var(--main);color:#fff;border-color:var(--main)}.add-tab{border-style:dashed}.rowhead{display:flex;align-items:center;justify-content:space-between;gap:10px;flex:0 0 auto;margin:0 2px 6px}.cat-title{font-size:22px;font-weight:900;color:#274650}.hint{font-size:13px;font-weight:800;color:#7b8c93}.phrases{flex:1;min-height:0;overflow:auto;display:grid;grid-template-columns:1fr 1fr;align-content:start;gap:8px}.phrase{border:1.5px solid #d9e5e9;background:#fff;border-radius:16px;padding:12px 10px;min-height:52px;font-size:19px;font-weight:900;color:#12202a;text-align:left;display:flex;align-items:center;justify-content:center;line-height:1.2}.phrase.wide{grid-column:1 / -1}.phrase.hot{border:2px solid #9ad3de}.modal,.show{position:fixed;inset:0;background:rgba(10,25,32,.25);display:none;align-items:center;justify-content:center;padding:20px;z-index:10}.modal.on,.show.on{display:flex}.dialog{width:min(520px,100%);background:#fff;border-radius:24px;padding:20px;box-shadow:0 12px 40px rgba(0,0,0,.18)}.dialog h2{margin:0 0 14px;font-size:24px}.field{width:100%;border:2px solid #d7e6ea;border-radius:14px;padding:14px;font-size:20px;font-weight:800;margin-bottom:12px}.select{width:100%;border:2px solid #d7e6ea;border-radius:14px;padding:14px;background:#fff;font-weight:800;margin-bottom:14px}.dialog-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.show{background:#fff;color:var(--text);z-index:20;flex-direction:column;text-align:center}.showText{font-size:44px;line-height:1.35;font-weight:900;white-space:pre-wrap;max-width:92%;word-break:break-word}.showHint{position:absolute;bottom:42px;color:#9aa8ad;font-weight:900}@media (max-height:740px){.app{gap:8px;padding-top:10px}.title{min-height:44px}.logo{width:48px;height:48px}.brand-name{font-size:27px}.sub{font-size:12px}.screen{flex-basis:31%;min-height:190px;font-size:28px;padding:22px}.btn{min-height:48px;padding:11px 8px}.bottom{padding:12px}.phrase{min-height:56px;font-size:19px;padding:13px}}
</style>
</head>
<body>
<div class="app">
<header class="title"><svg class="logo" viewBox="0 0 128 128"><rect x="8" y="8" width="112" height="112" rx="28" fill="#0f8fa8"/><path d="M30 38c0-12 10-21 23-17 5 1 8 4 11 4s6-3 11-4c13-4 23 5 23 17 0 10-4 18-8 28-4 11-5 30-17 30-8 0-8-16-9-23-1-4-7-4-8 0-1 7-1 23-9 23-12 0-13-19-17-30-4-10-8-18-8-28z" fill="#fff"/><circle cx="49" cy="50" r="4" fill="#0f8fa8"/><circle cx="79" cy="50" r="4" fill="#0f8fa8"/><path d="M53 64c6 7 16 7 22 0" fill="none" stroke="#0f8fa8" stroke-width="5" stroke-linecap="round"/><path d="M19 96l18-10 17 9" fill="none" stroke="#0f8fa8" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/></svg><div><div class="brand-name">デンタルトーク</div><div class="sub">歯科用・見せて伝える会話ボード</div></div></header>
<main id="screen" class="screen placeholder">ここに文章ができます</main>
<section class="actions"><button class="btn primary" id="showBtn">見せる</button><button class="btn" id="templateBtn">定型文</button><button class="btn" id="undoBtn">一つ戻す</button><button class="btn danger" id="clearBtn">全部消す</button></section>
<section class="bottom"><div class="tabs" id="tabs"></div><div class="rowhead"><div class="cat-title" id="catTitle">定型文</div><div class="hint">追加・長押しで削除</div></div><div class="phrases" id="phrases"></div></section>
</div>
<div class="modal" id="addModal"><div class="dialog"><h2>単語・文章を追加</h2><input class="field" id="newText" placeholder="追加したい文字を入力" autocomplete="off"><select class="select" id="newCategory"></select><div class="dialog-actions"><button class="btn" id="closeAdd">閉じる</button><button class="btn primary" id="saveAdd">追加</button></div></div></div>
<div class="show" id="showMode"><div class="showText" id="showText"></div><div class="showHint">タップで戻る</div></div>
<script>
const LS_CUSTOM='dentaltalk_custom_v4',LS_COUNTS='dentaltalk_counts_v4',LS_HIDDEN='dentaltalk_hidden_v4';
const LEGACY_CUSTOM='dentaltalk_custom_v3',LEGACY_COUNTS='dentaltalk_counts_v3',LEGACY_HIDDEN='dentaltalk_hidden_v3';
const categoryMap={fav:'template',greeting:'start_end',end:'start_end',symptom:'symptom_part',part:'symptom_part',check:'treatment',instruction:'treatment',treatment:'treatment'};
const categories=[{id:'template',name:'定型文'},{id:'start_end',name:'開始・終了'},{id:'symptom_part',name:'症状・部位'},{id:'treatment',name:'治療'}];
const tabCategories=categories.filter(c=>c.id!=='template');
const defaults=[
['痛かったら手を上げてください','template'],['うがいしてください','template'],['大丈夫ですか？','template'],['口を開けてください','template'],['水が出ます','template'],['少し音がします','template'],['終わりました','template'],
['こんにちは','start_end'],['よろしくお願いします','start_end'],['今日はどうされましたか？','start_end'],['お名前を教えてください','start_end'],['今日はここまでです','start_end'],['次回の予約を取ります','start_end'],['受付でお待ちください','start_end'],['お大事にしてください','start_end'],
['痛い','symptom_part'],['少し痛い','symptom_part'],['しみる','symptom_part'],['腫れている','symptom_part'],['出血があります','symptom_part'],['違和感があります','symptom_part'],['上','symptom_part'],['下','symptom_part'],['右','symptom_part'],['左','symptom_part'],['前歯','symptom_part'],['奥歯','symptom_part'],['この歯','symptom_part'],['ここ','symptom_part'],
['痛いですか？','treatment'],['しみますか？','treatment'],['大丈夫ですか？','treatment'],['いつからですか？','treatment'],['もう少し開けてください','treatment'],['閉じてください','treatment'],['力を抜いてください','treatment'],['鼻で呼吸してください','treatment'],['楽にしてください','treatment'],['レントゲンを撮ります','treatment'],['麻酔をします','treatment'],['少しチクッとします','treatment'],['クリーニングします','treatment'],['お薬を塗ります','treatment']
].map((x,i)=>({id:'d'+i,text:x[0],cat:x[1],builtin:true}));
let custom=load(LS_CUSTOM,null),counts=load(LS_COUNTS,null),hidden=load(LS_HIDDEN,null),tokens=[],current='start_end',pressTimer=null;
if(custom===null){custom=load(LEGACY_CUSTOM,[]).map(x=>({...x,cat:categoryMap[x.cat]||x.cat||'template'}));save(LS_CUSTOM,custom)}
if(counts===null){counts=load(LEGACY_COUNTS,{});save(LS_COUNTS,counts)}
if(hidden===null){hidden=load(LEGACY_HIDDEN,[]);save(LS_HIDDEN,hidden)}
function load(k,f){try{const v=localStorage.getItem(k);return v===null?f:JSON.parse(v)}catch(e){return f}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}function allItems(){return defaults.concat(custom).filter(x=>!hidden.includes(x.id))}function text(){return tokens.join('')}function updateScreen(){const s=document.getElementById('screen');if(tokens.length===0){s.textContent='ここに文章ができます';s.classList.add('placeholder')}else{s.textContent=text();s.classList.remove('placeholder')}}function addToken(t){if(tokens.length>0&&!text().endsWith('\n')&&!text().endsWith(' ')&&t!==' ')tokens.push('\n');tokens.push(t);counts[t]=(counts[t]||0)+1;save(LS_COUNTS,counts);updateScreen();render()}function renderTabs(){const tabs=document.getElementById('tabs');tabs.innerHTML='';tabCategories.forEach(c=>{const b=document.createElement('button');b.className='tab'+(c.id===current?' active':'');b.textContent=c.name;b.onclick=()=>{current=c.id;render()};tabs.appendChild(b)});const add=document.createElement('button');add.className='tab add-tab';add.textContent='＋追加';add.onclick=openAdd;tabs.appendChild(add)}function render(){renderTabs();document.getElementById('catTitle').textContent=categories.find(c=>c.id===current)?.name||'';let items=allItems().filter(x=>x.cat===current).sort((a,b)=>(counts[b.text]||0)-(counts[a.text]||0)||a.text.length-b.text.length);const box=document.getElementById('phrases');box.innerHTML='';items.forEach((item,idx)=>{const b=document.createElement('button');b.className='phrase '+(item.text.length>13?'wide':'')+(idx<3&&current==='template'?' hot':'');b.textContent=item.text;b.onclick=()=>addToken(item.text);b.addEventListener('touchstart',()=>startDelete(item),{passive:true});b.addEventListener('touchend',cancelDelete);b.addEventListener('touchmove',cancelDelete);b.addEventListener('mousedown',()=>startDelete(item));b.addEventListener('mouseup',cancelDelete);b.addEventListener('mouseleave',cancelDelete);box.appendChild(b)})}function startDelete(item){cancelDelete();pressTimer=setTimeout(()=>{if(confirm('「'+item.text+'」を削除しますか？')){if(item.builtin){hidden.push(item.id);save(LS_HIDDEN,hidden)}else{custom=custom.filter(x=>x.id!==item.id);save(LS_CUSTOM,custom)}render()}},650)}function cancelDelete(){if(pressTimer){clearTimeout(pressTimer);pressTimer=null}}function openAdd(){document.getElementById('newText').value='';document.getElementById('newCategory').innerHTML=categories.map(c=>`<option value="${c.id}" ${c.id===current?'selected':''}>${c.name}</option>`).join('');document.getElementById('addModal').classList.add('on');setTimeout(()=>document.getElementById('newText').focus(),100)}function closeAdd(){document.getElementById('addModal').classList.remove('on')}function saveAdd(){const input=document.getElementById('newText');const val=input.value.trim();if(!val){input.focus();return}const cat=document.getElementById('newCategory').value||'template';custom.push({id:'c'+Date.now(),text:val,cat,builtin:false});save(LS_CUSTOM,custom);current=cat;closeAdd();render()}
document.getElementById('templateBtn').onclick=()=>{current='template';render()};document.getElementById('undoBtn').onclick=()=>{tokens.pop();updateScreen()};document.getElementById('clearBtn').onclick=()=>{tokens=[];updateScreen()};document.getElementById('showBtn').onclick=()=>{const t=text().trim();if(!t)return;document.getElementById('showText').textContent=t;document.getElementById('showMode').classList.add('on')};document.getElementById('showMode').onclick=()=>document.getElementById('showMode').classList.remove('on');document.getElementById('closeAdd').onclick=closeAdd;document.getElementById('saveAdd').onclick=saveAdd;document.getElementById('newText').addEventListener('keydown',e=>{if(e.key==='Enter')saveAdd()});document.getElementById('addModal').addEventListener('click',e=>{if(e.target.id==='addModal')closeAdd()});updateScreen();render();
</script>
</body>
</html>
